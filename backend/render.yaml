services:
  - type: web
    name: lawyer-bhai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: laws-db
      mountPath: /data
      sizeGB: 1
